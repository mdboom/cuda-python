upload_cuda_python:
  stage: upload

  tags: [cuda-obi-linux-amd64-cpu-32]

  image: ubuntu:24.04

  needs:
    - job: build_cuda_python
      artifacts: true
    - job: test_cuda_python_cpu
      artifacts: false

  before_script:
    - . $CI_PROJECT_DIR/.gitlab/scripts/install_upload_deps.sh

  script:
    - . $CI_PROJECT_DIR/.gitlab/scripts/wheels_upload.sh python
