test_cuda_pathfinder_cpu:
  stage: test
  parallel:
    matrix:
      - PY_VER: ["3.10", "3.14"]

  tags: [cuda-obi-linux-amd64-cpu-32]

  image: quay.io/pypa/manylinux_2_28_x86_64

  needs:
    - job: build_cuda_pathfinder
      artifacts: true

  script:
    - export PY_VER="${PY_VER}"
    - bash ${CI_PROJECT_DIR}/.gitlab/scripts/wheels_test.sh pathfinder cpu

