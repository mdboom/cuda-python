test_cuda_pathfinder_gpu:
  stage: test
  parallel:
    matrix:
      - PY_VER: ["3.10", "3.14"]

  tags: [cudasw-amd64-a100-latest]

  image: quay.io/pypa/manylinux_2_28_x86_64

  needs:
    - job: build_cuda_pathfinder
      artifacts: true

  script:
    - export PY_VER="${PY_VER}"
    - WHEELS_TEST_LEVEL=standard bash ${CI_PROJECT_DIR}/.gitlab/scripts/wheels_test.sh pathfinder gpu

